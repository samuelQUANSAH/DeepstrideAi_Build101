version: 2
updates:
  # Maintain npm dependencies in the root directory
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Python dependencies in the rag-token-guardrails directory
  - package-ecosystem: "pip"
    directory: "/rag-token-guardrails"
    schedule:
      interval: "weekly"

  # Maintain GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
